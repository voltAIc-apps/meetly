<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="820" rx="8" fill="#f8fafc"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Meetly Booking Flow</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Swim lanes -- optional services in green (dashed)</text>

  <!-- Lane headers -->
  <rect x="20" y="74" width="200" height="36" rx="6" fill="#7c3aed"/>
  <text x="120" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Brand Website</text>

  <rect x="240" y="74" width="220" height="36" rx="6" fill="#2563eb"/>
  <text x="350" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Meetly (widget)</text>

  <rect x="480" y="74" width="200" height="36" rx="6" fill="#16a34a" opacity="0.7"/>
  <text x="580" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">app2gcal (optional)</text>

  <rect x="700" y="74" width="240" height="36" rx="6" fill="#ea580c"/>
  <text x="820" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">EmailJS</text>

  <!-- Lane dividers -->
  <line x1="230" y1="74" x2="230" y2="790" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="470" y1="74" x2="470" y2="790" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="74" x2="690" y2="790" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: User clicks trigger -->
  <rect x="250" y="130" width="200" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">1. User clicks trigger</text>
  <text x="350" y="164" text-anchor="middle" font-size="9" fill="#3b82f6">[data-booking-trigger] or JS API</text>

  <!-- Step 2: Fetch consultants -->
  <path d="M350,170 L350,192" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="194" width="200" height="34" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">2. Fetch consultants</text>

  <!-- Arrow to brand website -->
  <path d="M250,211 L210,211" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <rect x="28" y="194" width="180" height="34" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="118" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">/{id}.json per consultant</text>
  <text x="118" y="222" text-anchor="middle" font-size="9" fill="#7c3aed">from data-consultants-base</text>

  <!-- Arrow back from brand -->
  <path d="M208,220 L250,220" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Step 3: Choose date -->
  <path d="M350,228 L350,254" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="256" width="200" height="34" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="277" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">3. Choose date</text>

  <!-- Step 4: Compute slots client-side -->
  <path d="M350,290 L350,316" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="318" width="200" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">4. Compute time slots</text>
  <text x="350" y="354" text-anchor="middle" font-size="9" fill="#3b82f6">client-side from schedule JSON</text>

  <!-- Step 5: OPTIONAL verify against app2gcal -->
  <path d="M450,340 L490,340" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>

  <rect x="492" y="318" width="176" height="44" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="580" y="336" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">5. Verify booked slots</text>
  <text x="580" y="350" text-anchor="middle" font-size="9" fill="#16a34a">GET /api/v1/availability</text>
  <text x="580" y="360" text-anchor="middle" font-size="8" fill="#16a34a" font-style="italic">optional</text>

  <!-- Arrow back from app2gcal verify -->
  <path d="M492,354 L450,354" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Step 6: Choose time -->
  <path d="M350,362 L350,388" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="390" width="200" height="34" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="411" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">6. Choose time slot</text>

  <!-- Step 7: Visitor details -->
  <path d="M350,424 L350,450" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="452" width="200" height="34" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="473" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">7. Visitor details form</text>

  <!-- Step 8: Submit booking -->
  <path d="M350,486 L350,512" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="514" width="200" height="34" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="535" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">8. Submit booking</text>

  <!-- OPTIONAL: Arrow to app2gcal for booking -->
  <path d="M450,531 L490,531" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>

  <rect x="492" y="510" width="176" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="580" y="530" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">9. Create calendar event</text>
  <text x="580" y="544" text-anchor="middle" font-size="9" fill="#16a34a">POST /api/v1/bookings</text>
  <text x="580" y="556" text-anchor="middle" font-size="8" fill="#16a34a" font-style="italic">optional</text>

  <!-- Arrow back: booking_id + meet_link -->
  <path d="M492,548 L450,548" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="471" y="564" text-anchor="middle" font-size="8" fill="#16a34a">booking_id + meet_link</text>

  <!-- Decision diamond: app2gcal reachable? -->
  <path d="M350,548 L350,580" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <polygon points="350,584 410,610 350,636 290,610" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="350" y="607" text-anchor="middle" font-size="9" font-weight="600" fill="#854d0e">app2gcal</text>
  <text x="350" y="618" text-anchor="middle" font-size="9" font-weight="600" fill="#854d0e">reachable?</text>

  <!-- YES path (right, then down) -->
  <text x="416" y="604" font-size="9" font-weight="600" fill="#166534">yes</text>

  <!-- NO path: fallback -->
  <text x="273" y="604" font-size="9" font-weight="600" fill="#dc2626">no</text>

  <!-- Fallback box (left side under diamond) -->
  <path d="M290,610 L258,610" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="646" width="200" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="350" y="663" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">Fallback: generate video link</text>
  <text x="350" y="678" text-anchor="middle" font-size="9" fill="#dc2626">email-only booking (no calendar)</text>

  <!-- Connect NO to fallback box -->
  <path d="M258,610 L250,610 L250,646" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Both paths converge to send emails -->
  <!-- YES path down -->
  <path d="M410,610 L420,610 L420,710 L360,710" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- NO/fallback path down -->
  <path d="M350,686 L350,700" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 10: Send emails -->
  <rect x="250" y="700" width="200" height="44" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="720" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">10. Send emails</text>
  <text x="350" y="735" text-anchor="middle" font-size="9" fill="#3b82f6">visitor + consultant, with iCal</text>

  <!-- Arrow to EmailJS -->
  <path d="M450,722 L710,722" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="580" y="714" text-anchor="middle" font-size="9" fill="#ea580c">POST emailjs.com/api REST</text>

  <rect x="712" y="700" width="216" height="44" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="820" y="720" text-anchor="middle" font-size="10" font-weight="600" fill="#9a3412">EmailJS REST API</text>
  <text x="820" y="735" text-anchor="middle" font-size="9" fill="#ea580c">2 emails + .ics attachments</text>

  <!-- Step 11: Confirmation -->
  <path d="M350,744 L350,762" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="764" width="200" height="40" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="350" y="783" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">11. Confirmation screen</text>
  <text x="350" y="797" text-anchor="middle" font-size="9" fill="#3b82f6">meet link + ICS download</text>

  <!-- Legend -->
  <rect x="20" y="812" width="920" height="3" rx="1" fill="#e2e8f0"/>

  <!-- Legend row 1 -->
  <rect x="30" y="795" width="12" height="12" rx="2" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="48" y="805" font-size="9" fill="#475569">Required (widget + brand + email)</text>

  <rect x="230" y="795" width="12" height="12" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="248" y="805" font-size="9" fill="#475569">Optional (app2gcal)</text>

  <rect x="390" y="795" width="12" height="12" rx="2" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="408" y="805" font-size="9" fill="#475569">Fallback (email-only, no calendar)</text>

  <line x1="580" y1="801" x2="610" y2="801" stroke="#475569" stroke-width="1.5"/>
  <text x="616" y="805" font-size="9" fill="#475569">required flow</text>

  <line x1="700" y1="801" x2="730" y2="801" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="736" y="805" font-size="9" fill="#475569">optional flow</text>
</svg>
